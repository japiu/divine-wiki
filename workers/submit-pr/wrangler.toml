name = "divine-submit-pr"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for rate-limit counters (one open PR per user, 3/day cap).
# Create with:  wrangler kv:namespace create "RATE_LIMIT"
# Then paste the resulting ID below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
UPSTREAM_OWNER = "DivineSkins"
UPSTREAM_REPO = "divine-wiki"
UPSTREAM_BASE = "main"
# Max open PRs per GitHub user at once.
MAX_OPEN_PRS = "1"
# Max PR creations per user per 24h.
MAX_PRS_PER_DAY = "3"
# Min GitHub account age in days before submissions are accepted.
MIN_ACCOUNT_AGE_DAYS = "7"
# CORS allowlist — set to the wiki's origin.
ALLOWED_ORIGIN = "https://wiki.divineskins.gg"

# Secrets (set via `wrangler secret put`):
#   TURNSTILE_SECRET_KEY — Cloudflare Turnstile secret for anti-bot verification
