name: format-check

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.json"
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.css"
      - "**/*.yml"
      - "**/*.yaml"
      - "package.json"
      - "package-lock.json"
      - ".prettierrc*"
      - ".prettierignore"

# Fork PRs only need to be read; the prettier check never writes anything.
permissions:
  contents: read

jobs:
  prettier:
    name: prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check
