name: content-lint

on:
  pull_request:
    paths:
      - "content/**"
      - "messages/**"

jobs:
  content-lint:
    name: content-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Markdownlint
        run: npx markdownlint-cli2 "content/docs/en/**/*.mdx"

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 4 --accept 200,201,202,203,204,429 --exclude-loopback --exclude "wiki\.divineskins\.gg" --exclude "api\.divineskins\.gg" "content/docs/en/**/*.mdx"
          fail: true

      - name: cSpell
        run: npx cspell --no-progress "content/docs/en/**/*.mdx"

      - name: Alt-text check
        run: |
          git fetch origin main --depth=1
          git diff origin/main...HEAD -- 'content/**/*.mdx' | grep -E '^\+.*<img' | grep -vE 'alt=' && exit 1 || echo "alt-text OK"
